# ╔════════════════════════════════════════════════════════════════════════╗
# ║  HOW TO READ THIS SCHEMA — do not delete (LLM + humans rely on it)        ║
# ╚════════════════════════════════════════════════════════════════════════╝
#
# Root sections:
#   rules:    cross-cutting contracts every file / index satisfies.
#   root:     the .llm/ node tree. `root` is the top node; its children
#             (intake, plans, …) are the pillars. Every node shares one shape
#             { path?, frontmatter?, tags?, entities? } and nests recursively.
#   meta:     framework metadata + this project's component registry.
#
# frontmatter:  a list of frontmatter keys. Suffix `!` = required, no suffix =
#               optional.  e.g. [key!, type, status!] → key & status required.
#               `human_revised` is universal (rules.markdown) — never repeated.
#
# tags:  marker blocks `<!-- llm:NAME --> ... <!-- /llm:NAME -->`. The marker
#        NAME is the path through the node tree, colon-joined: a node's index
#        tag is just its key (-> llm:intake); a tag deeper in the tree joins the
#        ancestor keys (-> llm:plans:plan:handoff:files).
#
#        v4 — every tag body is a markdown table with TWO universal columns:
#
#          | Link                  | Description                              |
#          |-----------------------|------------------------------------------|
#          | [name](path/index.md) | one-line prose explaining the linked file |
#
#        Tag entries in the schema only declare routing hints:
#          host_file: <*.md|*>   → explicit markdown host (only needed for tags
#                                  outside the node tree, e.g. meta.tags. Node
#                                  index tags derive host_file from the path
#                                  automatically).
#        Anything else (columns, format, description, number) is gone — the
#        shape is universal and hardcoded in the parser.
#
# path:  see the `root` section below — RELATIVE to the parent node; implicit =
#        the node's key; a directory path resolves to that dir's index.md.

version: 4
flavor: qa-basic   # self-identifying so doctor/sync can detect the installed flavor

# ─────────────────────────────────────────────────────────────────────────
# AXIS NOTE — in this flavor the universal `apps:` field enumerates the
# project's TEST LEVELS (unit | integration | e2e | …), not software
# components. The field name stays `apps` so `index.md` remains byte-identical
# to __base (the universal kernel) and the parser is untouched; `domain.md`
# frames the semantic. A coverage area or test plan declares the levels it
# spans (e.g. apps: [unit, e2e]). See meta.apps.values below for the value set.
# ─────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────
# rules — cross-cutting, not specific to any single pillar.
# ─────────────────────────────────────────────────────────────────────────
rules:
  # Every markdown file: at least one H1, and `human_revised` in frontmatter
  # (defaults to false; flip to true after a human reads it end-to-end).
  markdown:
    required_heading: h1
    frontmatter: [human_revised!]

  # Every index.md carries these (in addition to the markdown rule above).
  index_md:
    frontmatter: [generated!, apps!]

  # Every pillar's shallow index.md (the generated one) carries these.
  # Pillar-specific extras go in that node's frontmatter (e.g. intake adds tracker).
  pillar_index:
    frontmatter: [generated!, generated-at!, apps!] # generated: true; apps: [meta]
    # No `count`: the table's row count IS the count; a separate field is redundant.

  # Soft rule — warning only, never fails validation. Bullet items under the
  # named acceptance/requirement sections should match the EARS pattern;
  # free prose elsewhere is fine. EARS describes the REQUIREMENT to verify.
  ears:
    severity: warning
    pattern: "((WHEN|WHILE|WHERE|IF) .+ )?THE SYSTEM SHALL .+" # all five EARS forms: ubiquitous/event/state/optional/unwanted
    applies_to:
      # Acceptance criteria on intake items / slug-based plans use EARS — the
      # behaviour to verify. The coverage pillar does NOT use EARS; a test
      # scenario is written in Given-When-Then (see the `gherkin` rule).
      - intake tickets — "## Acceptance Criteria (EARS)"
      - slug-based plans — "## Acceptance Criteria (EARS)"

  # Soft rule — warning only. Bullet items under a coverage area's scenarios
  # section should match Given-When-Then. GWT describes the TEST: a concrete
  # case that verifies a requirement. The requirement↔test pairing (EARS on the
  # intake item, GWT on the covering scenario) IS the traceability link.
  # Enforced by the same schema-driven pattern check as `ears` (doctor sub-pass
  # [4]); the section marker is the quoted substring of each applies_to entry.
  gherkin:
    severity: warning
    pattern: "GIVEN .+ WHEN .+ THEN .+"
    applies_to:
      - coverage areas — "## Scenarios (GWT)"

# ─────────────────────────────────────────────────────────────────────────
# root — the .llm/ tree. `root` is the top node; its children (intake, plans, …)
# are the pillars. EVERY node — root and every descendant — shares one shape:
#   path        the node's dir/file, RELATIVE to its parent. Implicit = the key;
#               explicit only when the segment differs (e.g. <KEY>, t<N>.md).
#               Ends in a directory → the node's file is that dir's index.md.
#   frontmatter the index.md frontmatter of THIS node (beyond the rules.* baseline).
#   tags        marker blocks in THIS node's index.md (body shape universal — see rules.tag_table).
#   entities    child nodes (recursive, same shape) — the files/dirs inside.
# The parser is a single recursion. `root` lists all four (even when empty) as
# the reference; children list only what they use.
# ─────────────────────────────────────────────────────────────────────────
root:
  # The .llm/ root. index.md = .llm/index.md (static, generated: false) — pure
  # kernel, byte-identical across flavors. The project-owned components/root
  # marker blocks live in domain.md, declared under meta.tags via host_file.
  path: # implicit — the .llm/ root itself
  frontmatter: [framework-version!, depends-on] # +depends-on: root index pulls in domain.md; generated/apps from rules.index_md
  tags: {}
  entities:
    intake:
      # Tracker-agnostic mirror. `tracker:` on intake/index.md is a LIST of
      # trackers this project pulls from (typically one — e.g. [jira] — but a
      # project crossing trackers can list multiple, e.g. [jira, linear]). Each
      # item then records its OWN tracker (scalar) in its frontmatter, so the
      # source of every <KEY> is unambiguous. plans/ and archive/ don't carry
      # tracker — they link to intake via `key` and the tracker is known there.
      frontmatter: [tracker!]
      tags:
        intake: {}
      entities:
        item:
          # Flat: every intake item is a sibling — no enforced hierarchy. `type`
          # is the tracker issuetype (epic | story | task | bug | …); a bug
          # report and a test request are both just items. `tracker` records
          # which tracker this item came from (must be one of the values listed
          # in intake/index.md's tracker list). `relates` links items
          # many-to-many and non-blocking (other <KEY>s) — distinct from the
          # blocking `depends-on` in plans/coverage.
          path: <KEY>
          frontmatter:
            [
              generated!,
              key!,
              type!,
              tracker!,
              status!,
              synced-at!,
              apps!,
              relates,
            ]

    plans:
      tags:
        plans: {}
      entities:
        plan:
          # A test campaign. key optional: slug-based plans (maintenance-<slug>)
          # have no tracker id. `scope:` names the coverage/ paths the campaign
          # touches. `apps` = the levels the campaign authors/automates at.
          path: <PLAN-ID>
          frontmatter:
            [
              generated!,
              scope!,
              status!,
              summary!,
              apps!,
              key,
              type,
              epic,
              story,
              aux,
            ]
          entities:
            # task, handoff, delta_draft live at the same level inside the plan dir.
            task:
              # A task = author/automate a case (or a slice of cases) at one or
              # more levels. `apps` = the levels this task writes tests at.
              path: t<N>.md
              frontmatter:
                [
                  plan!,
                  task!,
                  depends-on!,
                  concerns!,
                  files!,
                  status!,
                  apps!,
                  aux!,
                ]
            handoff:
              path: handoff-t<N>.md
              frontmatter: [plan!, task!, status!, date!]
              tags:
                files: {} # body shape universal — each row links a touched file with a one-line description
            delta_draft:
              path: delta-draft.md
              frontmatter: [plan!, status!, date!] # status: always draft

    archive:
      tags:
        archive: {}
      entities:
        plan:
          # An archived campaign IS the plan's index.md: the archive flow copies
          # it, forces status: done, and adds completed-at + delta. Inherits the
          # plan's frontmatter (scope, type, epic, story, key, aux).
          #
          # The archive plan directory is EPHEMERAL: created in archive flow
          # Phase 1, pruned in Phase 4 after delta absorption. Only the row in
          # archive/index.md survives (with the absorbed commit referenced in
          # its Description). The `delta` frontmatter is optional because it's
          # only meaningful while the directory exists.
          path: <PLAN-ID>
          frontmatter: [generated!, scope!, status!, summary!, apps!, completed-at!, delta, key, type, epic, story, aux]
          entities:
            delta:
              path: delta.md
              frontmatter: [plan!, date!, apps]

    coverage:
      # The DURABLE truth of how the system is verified — the living coverage
      # map. An `area` mirrors a slice of the system-under-test; it may nest
      # child `area`s to arbitrary depth (recursive). depends-on = hard,
      # blocking test prerequisites (load them WITH this area — e.g. checkout
      # coverage presumes auth coverage); relates = soft cross-links, including
      # the intake <KEY>s whose requirements this area covers (the traceability
      # link). The index surfaces both so the LLM can tree-shake: pull the
      # required closure (depends-on), then weigh the related set (relates).
      # deltas / consolidated-at are alternative states: an area lists the plan
      # IDs whose deltas built it, until `coverage consolidate` compacts them
      # into a single consolidated-at date.
      #
      # Scenarios live in a "## Scenarios (GWT)" section of the area's index.md,
      # written in Given-When-Then (rules.gherkin). A scenario that grows
      # detailed enough to need its own file becomes a `case` (<case>.md).
      tags:
        coverage: {}
      entities:
        area:
          path: <area>
          frontmatter:
            [
              generated!,
              name!,
              summary!,
              depends-on!,
              relates,
              apps!,
              deltas,
              consolidated-at,
            ]
          entities:
            case:
              path: <case>.md
              frontmatter:
                [
                  generated!,
                  name!,
                  summary!,
                  depends-on!,
                  relates,
                  apps!,
                  deltas,
                  consolidated-at,
                ]
            # an area may also nest child areas here (same shape as `area`).

    exploring:
      tags:
        exploring: {}
      entities:
        idea:
          # Exploratory-testing charters / spikes. status: idea | considering |
          # promoted | dropped — terminal exits (promote / drop) move or delete
          # the directory.
          path: <slug>
          frontmatter: [generated!, status!, summary!, apps!]

    standards:
      # DURABLE pillar (like coverage, unlike the finalize-and-delete transients).
      # Testing conventions — naming, fixtures, mocking policy, coverage gates,
      # flakiness policy, environments — that outlive any single campaign and
      # apply ACROSS coverage areas. Each standard is a directory
      # `standards/<slug>/index.md` (like every other entity), NOT a bare
      # `<slug>.md` — a flat `*.md` would collide with the pillar's own
      # `standards/index.md` under doctor's glob. Flat (no recursion, unlike
      # coverage); not loaded by default. An author drills in via `relates` from
      # a coverage area or from this shallow index.
      tags:
        standards: {}
      entities:
        standard:
          path: <slug>
          frontmatter: [generated!, name!, summary!, apps!, relates]

# ─────────────────────────────────────────────────────────────────────────
# meta — framework metadata and the project's component registry.
# ─────────────────────────────────────────────────────────────────────────
meta:
  # Valid values for the apps: frontmatter field. In THIS flavor `apps`
  # enumerates TEST LEVELS (see the AXIS NOTE near the top). Add or drop entries
  # to match your test pyramid. `all` (cross-level / shared) and `meta`
  # (framework plumbing) are reserved and must remain.
  apps:
    values:
      # === test levels — tune to your pyramid ===
      - unit
      - integration
      - e2e
      - contract
      - performance
      # === reserved (do not remove) ===
      - all      # cross-level / shared (test utilities, fixtures, CI harness)
      - meta     # framework plumbing — used by index.md / pillar indexes

  # Marker tags that live outside the node tree. v4 — every body is a
  # [Link, Description] table; entries below only route the tag to its host.
  tags:
    # Project-owned blocks hosted on domain.md (the flavor hook).
    components: { host_file: domain.md }
    root: { host_file: domain.md }
    # Universal "files" pattern tag — links to repo files with one-line
    # descriptions; can appear on any markdown host.
    files: { host_file: "*" }
    # Handoff "Files touched" block (templates/handoff.md) — colon-named pattern tag.
    "files:touched": { host_file: "*" }
    # Inventory of adopter-added templates, hosted on templates/index.md.
    templates: { host_file: "templates/index.md" }

  # Cross-file checks across the .llm/ tree.
  #   implemented — run today by CLI commands / recipe skills.
  #   deferred    — not yet enforced by the validator.
  cross_file_checks:
    implemented:
      - "Intake refinement: no leftover raw-import block"
      - "Plan status and task progress (done/total)"
      - "Tasks marked done that lack a handoff-t<N>.md"
      - "Archive presence and finalization (no temp-archive-flow.delete-me.md residue)"
      - "Coverage deltas integrity — each path in the plan's scope: lists the plan's key in its deltas:"
    deferred:
      - "Plan scope: paths resolve to existing coverage/<area>[/<subarea>...]/index.md"
      - "Task depends-on: references resolve to existing tasks in the same plan"
      - "Requirement→test traceability — every intake AC (EARS) line is covered by a coverage scenario that relates back to the <KEY>"
      - "deltas: in coverage frontmatter reference existing archive/<PLAN-ID>/ entries"

  # Compatibility & versioning.
  compatibility:
    framework_version_field: framework-version
    framework_version_location: .llm/index.md
    rule:
      - The `framework-version:` field in .llm/index.md must equal the `version:` field in this schema.
      - The validator enforces equality.
      - Bumping `version:` here without bumping `framework-version:` surfaces an explicit mismatch error — that is the migration signal.
